<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap');

html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: "Montserrat", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.popup-link-wrap {
  position: relative;
  width: 100%;
  display: flex;
  justify-content: center;
  padding: 24px 12px;
  background: transparent;
  overflow: visible;
}

.popup-link-box {
  position: relative;
  display: inline-block;
  max-width: 980px;
  text-align: center;
}

.popup-link {
  position: relative;
  z-index: 2;
  display: inline;
  color: #d71c1c;
  text-decoration: none;
  font-size: 42px;
  line-height: 1.15;
  font-weight: 700;
  letter-spacing: -0.02em;
  cursor: pointer;
}

.popup-link:hover {
  color: #d71c1c;
}

.cursor-demo {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 72px;
  height: 72px;
  pointer-events: none;
  z-index: 3;
  transform: translate(-220px, -85px);
  opacity: 0;
}

.cursor-demo svg {
  width: 100%;
  height: 100%;
  display: block;
  filter: drop-shadow(0 6px 18px rgba(0, 0, 0, 0.18));
}

.cursor-arrow,
.cursor-hand {
  position: absolute;
  inset: 0;
  opacity: 0;
}

.popup-link-wrap.is-visible .cursor-demo {
  animation: cursorMove 1.55s cubic-bezier(.22,.75,.2,1) forwards;
}

.popup-link-wrap.is-visible .cursor-arrow {
  animation: arrowShow 1.55s linear forwards;
}

.popup-link-wrap.is-visible .cursor-hand {
  animation: handShow 1.55s linear forwards;
}

@keyframes cursorMove {
  0% {
    opacity: 0;
    transform: translate(-220px, -85px) scale(0.92);
  }
  10% {
    opacity: 1;
    transform: translate(-220px, -85px) scale(0.96);
  }
  62% {
    opacity: 1;
    transform: translate(165px, -8px) scale(1);
  }
  100% {
    opacity: 0;
    transform: translate(165px, -8px) scale(1);
  }
}

@keyframes arrowShow {
  0% {
    opacity: 1;
    transform: scale(1);
  }
  64% {
    opacity: 1;
    transform: scale(1);
  }
  72% {
    opacity: 0;
    transform: scale(0.9);
  }
  100% {
    opacity: 0;
    transform: scale(0.9);
  }
}

@keyframes handShow {
  0% {
    opacity: 0;
    transform: scale(0.82);
  }
  63% {
    opacity: 0;
    transform: scale(0.82);
  }
  74% {
    opacity: 1;
    transform: scale(1.18);
  }
  86% {
    opacity: 1;
    transform: scale(0.96);
  }
  100% {
    opacity: 0;
    transform: scale(1.08);
  }
}

@media (max-width: 980px) {
  .popup-link {
    font-size: 42px;
  }
}

@media (max-width: 640px) {
  .popup-link {
    font-size: 28px;
    line-height: 1.2;
  }

  .cursor-demo {
    width: 58px;
    height: 58px;
  }

  .popup-link-wrap.is-visible .cursor-demo {
    animation: cursorMoveMobile 1.55s cubic-bezier(.22,.75,.2,1) forwards;
  }

  @keyframes cursorMoveMobile {
    0% {
      opacity: 0;
      transform: translate(-135px, -70px) scale(0.92);
    }
    10% {
      opacity: 1;
      transform: translate(-135px, -70px) scale(0.96);
    }
    62% {
      opacity: 1;
      transform: translate(92px, -4px) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(92px, -4px) scale(1);
    }
  }
}
</style>

<div class="popup-link-wrap" id="popup-link-wrap">
  <div class="popup-link-box">
    <a class="popup-link" href="#popup:embedcode">
      Нажмите, чтобы ознакомиться<br>с краткой хронологией конфликта
    </a>

    <div class="cursor-demo" aria-hidden="true">
      <div class="cursor-arrow">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 5.5L36.5 26.2L24.5 28.5L30.8 41.2C31.6 42.8 31 44.7 29.4 45.4L27.6 46.2C26 46.9 24.1 46.3 23.3 44.8L17 32.1L8.4 40.8L9 5.5Z" fill="#20242B"/>
          <path d="M9 5.5L36.5 26.2L24.5 28.5L30.8 41.2C31.6 42.8 31 44.7 29.4 45.4L27.6 46.2C26 46.9 24.1 46.3 23.3 44.8L17 32.1L8.4 40.8L9 5.5Z" stroke="#ffffff" stroke-width="2"/>
        </svg>
      </div>

      <div class="cursor-hand">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.6 22.1V10.4C17.6 8.5 19.1 7 21 7C22.9 7 24.4 8.5 24.4 10.4V20.2H25.8V8.7C25.8 6.8 27.3 5.3 29.2 5.3C31.1 5.3 32.6 6.8 32.6 8.7V21H34V12.1C34 10.2 35.5 8.7 37.4 8.7C39.3 8.7 40.8 10.2 40.8 12.1V28.1C40.8 36.5 34 43.3 25.6 43.3H23.8C18.8 43.3 14.2 40.8 11.5 36.6L6.9 29.6C5.8 27.8 6.3 25.4 8.1 24.3C9.9 23.2 12.3 23.7 13.4 25.5L16.1 29.6V22.1C16.1 20.2 17.6 18.7 19.5 18.7C21.4 18.7 22.9 20.2 22.9 22.1V28H24.4V22.1H17.6Z" fill="#20242B"/>
          <path d="M17.6 22.1V10.4C17.6 8.5 19.1 7 21 7C22.9 7 24.4 8.5 24.4 10.4V20.2H25.8V8.7C25.8 6.8 27.3 5.3 29.2 5.3C31.1 5.3 32.6 6.8 32.6 8.7V21H34V12.1C34 10.2 35.5 8.7 37.4 8.7C39.3 8.7 40.8 10.2 40.8 12.1V28.1C40.8 36.5 34 43.3 25.6 43.3H23.8C18.8 43.3 14.2 40.8 11.5 36.6L6.9 29.6C5.8 27.8 6.3 25.4 8.1 24.3C9.9 23.2 12.3 23.7 13.4 25.5L16.1 29.6V22.1C16.1 20.2 17.6 18.7 19.5 18.7C21.4 18.7 22.9 20.2 22.9 22.1V28H24.4V22.1H17.6Z" stroke="#ffffff" stroke-width="2"/>
        </svg>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  const wrap = document.getElementById('popup-link-wrap');
  if (!wrap) return;

  let played = false;

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!played && entry.isIntersecting) {
        played = true;
        setTimeout(() => {
          wrap.classList.add('is-visible');
        }, 180);
        observer.disconnect();
      }
    });
  }, {
    threshold: 0.28
  });

  observer.observe(wrap);
})();
</script>
